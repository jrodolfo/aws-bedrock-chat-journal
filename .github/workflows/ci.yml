name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Show Java version on Unix
        if: runner.os != 'Windows'
        run: java -version
        shell: bash

      - name: Show Java version on Windows
        if: runner.os == 'Windows'
        run: |
          java -version
          echo "JAVA_HOME=$env:JAVA_HOME"
        shell: pwsh

      - name: Run Gradle tests on Unix
        if: runner.os != 'Windows'
        run: ./gradlew test
        shell: bash

      - name: Run Gradle tests on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat test
        shell: pwsh

      - name: Verify Bash helper scripts on Unix
        if: runner.os != 'Windows'
        run: ./scripts/build-and-test.sh --help && ./scripts/run-local.sh --help
        shell: bash

      - name: Verify PowerShell helper scripts on Windows
        if: runner.os == 'Windows'
        run: .\scripts\build-and-test.ps1 --help; .\scripts\run-local.ps1 --help
        shell: pwsh
